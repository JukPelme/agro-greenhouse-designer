# Машинопроверяемые требования из СП 107.13330.2012 «Теплицы и парники»,
# извлечённые автоматически и сверенные с дословными цитатами через RAG.
#
# Идентификаторы:
#   SP107.X.Y[-suffix] — реальный пункт СП 107.13330
#   ENG.X              — инженерная sanity-проверка (не из норматива)

rules:

  # ── ТЕРРИТОРИЯ И ПЛАНИРОВКА (раздел 4) ───────────────────────────

  - rule_id: SP107.4.4-year-round
    sp_clause: "СП 107.13330 п. 4.4"
    summary: "Расстояние между зимними теплицами в составе ТОК/РОТК — не менее 6 м."
    severity: error
    check:
      field: design.min_aisle_width_m
      op: ">="
      value: 6.0
    applies_when:
      brief.greenhouse_type: year_round

  - rule_id: SP107.4.4-seasonal
    sp_clause: "СП 107.13330 п. 4.4"
    summary: "Расстояние между сезонными теплицами — не менее 1,5 м."
    severity: error
    check:
      field: design.min_aisle_width_m
      op: ">="
      value: 1.5
    applies_when:
      brief.greenhouse_type: seasonal

  - rule_id: SP107.4.16
    sp_clause: "СП 107.13330 п. 4.16"
    summary: "Сетчатое ограждение территории теплиц — высотой не менее 1,6 м."
    severity: warning
    check:
      field: design.fence_height_m
      op: ">="
      value: 1.6

  # ── ГЕОМЕТРИЯ БЛОКОВ (раздел 5: 5.5, 5.8, 5.9, 5.10, 5.11) ────────

  - rule_id: SP107.5.5-eave
    sp_clause: "СП 107.13330 п. 5.5"
    summary: "Высота от пола до низа конструкций (карниз) — не менее 2,4 м."
    severity: error
    check:
      field: design.blocks[*].eave_height_m
      op: ">="
      value: 2.4

  - rule_id: SP107.5.5-span-angar
    sp_clause: "СП 107.13330 п. 5.5"
    summary: "Пролёт однопролётных (ангарных) теплиц — не более 21 м."
    severity: error
    check:
      field: design.blocks[*].span_width_m
      op: "<="
      value: 21.0
    applies_when:
      design.blocks[*].layout: angar

  - rule_id: SP107.5.5-span-block
    sp_clause: "СП 107.13330 п. 5.5"
    summary: "Пролёт многопролётных (блочных) теплиц — не более 9 м."
    severity: error
    check:
      field: design.blocks[*].span_width_m
      op: "<="
      value: 9.0
    applies_when:
      design.blocks[*].layout: block

  - rule_id: SP107.5.8
    sp_clause: "СП 107.13330 п. 5.8"
    summary: "Высота цоколя теплицы — не менее 0,3 м."
    severity: warning
    check:
      field: design.plinth_height_m
      op: ">="
      value: 0.3

  - rule_id: SP107.5.9
    sp_clause: "СП 107.13330 п. 5.9"
    summary: "Верх фундамента — на 0,3 м и более выше поверхности почвы."
    severity: warning
    check:
      field: design.foundation_above_soil_m
      op: ">="
      value: 0.3

  - rule_id: SP107.5.10-straight
    sp_clause: "СП 107.13330 п. 5.10"
    summary: "Уклон прямолинейных скатов кровли — не менее 45%."
    severity: error
    check:
      field: design.blocks[*].roof_slope_pct
      op: ">="
      value: 45.0
    applies_when:
      design.blocks[*].roof_shape: straight

  - rule_id: SP107.5.10-arched
    sp_clause: "СП 107.13330 п. 5.10"
    summary: "Уклон криволинейных стрельчатых покрытий — не менее 20%."
    severity: error
    check:
      field: design.blocks[*].roof_slope_pct
      op: ">="
      value: 20.0
    applies_when:
      design.blocks[*].roof_shape: arched

  - rule_id: SP107.5.11-glass
    sp_clause: "СП 107.13330 п. 5.11"
    summary: "Доля светонепроницаемых конструкций при стеклянном ограждении — не более 15%."
    severity: warning
    check:
      field: design.blocks[*].opaque_share_pct
      op: "<="
      value: 15.0
    applies_when:
      design.blocks[*].covering: glass

  - rule_id: SP107.5.11-film
    sp_clause: "СП 107.13330 п. 5.11"
    summary: "Доля светонепроницаемых конструкций при плёночном ограждении — не более 10%."
    severity: warning
    check:
      field: design.blocks[*].opaque_share_pct
      op: "<="
      value: 10.0
    applies_when:
      design.blocks[*].covering: polyethylene

  # ── МАТЕРИАЛЫ (5.14, 5.23) ──────────────────────────────────────

  - rule_id: SP107.5.14-snow
    sp_clause: "СП 107.13330 п. 5.14"
    summary: "Коэффициент перегрузки расчётной снеговой нагрузки — 1,4."
    severity: info
    check:
      field: engineering.loads.snow_overload_factor
      op: "=="
      value: 1.4

  - rule_id: SP107.5.23
    sp_clause: "СП 107.13330 п. 5.23"
    summary: "Толщина стекла теплиц — не более 4 мм."
    severity: warning
    check:
      field: design.blocks[*].glass_thickness_mm
      op: "<="
      value: 4.0
    applies_when:
      design.blocks[*].covering: glass

  # ── ВОДОСНАБЖЕНИЕ (6.8, 6.14) ────────────────────────────────────

  - rule_id: SP107.6.8
    sp_clause: "СП 107.13330 п. 6.8"
    summary: "Радиус зоны обслуживания одним поливным краном — не более 45 м."
    severity: warning
    check:
      field: engineering.water.hose_service_radius_m
      op: "<="
      value: 45.0

  - rule_id: SP107.6.14-greenhouse
    sp_clause: "СП 107.13330 п. 6.14"
    summary: "Категория надёжности водоснабжения теплиц — не ниже II (значение ≤2)."
    severity: error
    check:
      field: engineering.water.reliability_category
      op: "<="
      value: 2
    applies_when:
      brief.greenhouse_type: year_round

  # ── ОТОПЛЕНИЕ И ВЕНТИЛЯЦИЯ (7.9, 7.13, 7.18) ────────────────────

  - rule_id: SP107.7.9
    sp_clause: "СП 107.13330 п. 7.9"
    summary: "Температура теплоносителя в системах отопления теплиц — не более 150 °C."
    severity: error
    check:
      field: engineering.heat.supply_temp_c
      op: "<="
      value: 150.0

  - rule_id: SP107.7.13
    sp_clause: "СП 107.13330 п. 7.13"
    summary: "Доля теплоты в нижнюю зону высотой 1 м — не менее 40%."
    severity: warning
    check:
      field: engineering.heat.share_to_lower_zone_pct
      op: ">="
      value: 40.0

  - rule_id: SP107.7.18
    sp_clause: "СП 107.13330 п. 7.18"
    summary: "Площадь проёмов естественной вентиляции в многопролётных теплицах — не менее 20% площади ограждения (10% севернее 60° с.ш.)."
    severity: warning
    check:
      field: engineering.ventilation.opening_share_of_envelope_pct
      op: ">="
      value: 20.0
    applies_when:
      engineering.ventilation.forced_vent_required: false

  # ── ОСВЕЩЕНИЕ (8.3) ─────────────────────────────────────────────

  - rule_id: SP107.8.3
    sp_clause: "СП 107.13330 п. 8.3"
    summary: "Освещённость на уровне пола в проездах теплиц — не более 10 лк."
    severity: info
    check:
      field: engineering.light.aisle_floor_illuminance_lx
      op: "<="
      value: 10.0

  # ── Инженерные sanity-проверки (не из СП) ────────────────────────

  - rule_id: ENG.1-ridge-vs-eave
    sp_clause: "Инженерная проверка (не из СП): высота конька выше карниза"
    summary: "Высота конька должна быть выше высоты по водостоку как минимум на 0,5 м — иначе кровля не имеет уклона для стока."
    severity: error
    check:
      field: design.blocks[*].ridge_height_m
      op: ">"
      value: 0
    # Содержательная проверка (ridge > eave + 0.5) делается в rules_engine.

  - rule_id: ENG.2-aux-share
    sp_clause: "Инженерная проверка (не из СП): обоснованная доля подсобок"
    summary: "Подсобные зоны должны занимать 5–30% площади комплекса."
    severity: warning
    check:
      field: design.aux_share_pct
      op: ">="
      value: 5.0

  - rule_id: ENG.3-light-min
    sp_clause: "Инженерная проверка (не из СП): минимальное светопропускание для круглогодичной"
    summary: "Светопропускание ограждения круглогодичной теплицы — не ниже 0,60."
    severity: error
    check:
      field: design.blocks[*].light_transmittance
      op: ">="
      value: 0.60
    applies_when:
      brief.greenhouse_type: year_round

  - rule_id: ENG.4-vent-ach
    sp_clause: "Инженерная проверка (не из СП): кратность воздухообмена летом"
    summary: "Целевая кратность воздухообмена в тёплый период — не менее 40 ч⁻¹."
    severity: warning
    check:
      field: engineering.ventilation.summer_air_changes_per_hour
      op: ">="
      value: 40.0
