# Машинопроверяемые требования из СП 107.13330.2012 «Теплицы и парники»,
# извлечённые автоматически из проиндексированного PDF и сверенные с
# дословными цитатами через RAG.
#
# Идентификаторы:
#   SP107.X.Y[-suffix] — реальный пункт СП 107.13330
#   ENG.X              — инженерная sanity-проверка (не из норматива,
#                        отмечена как best-practice constraint)
#
# Формат:
#   rule_id    — стабильный идентификатор (используется как ключ для RAG-цитаты)
#   sp_clause  — номер пункта СП (для exact-lookup в ChromaDB по clause_id)
#   summary    — формулировка требования с числом, своими словами
#   severity   — error | warning | info
#   check.field — дотированный путь в state
#   check.op    — оператор сравнения
#   check.value — пороговое значение

rules:

  # ── СП 107.13330 — реальные требования ──────────────────────────────────

  - rule_id: SP107.4.4-year-round
    sp_clause: "СП 107.13330 п. 4.4"
    summary: "Расстояние между зимними теплицами в составе ТОК/РОТК — не менее 6 м (ширина проездов)."
    severity: error
    check:
      field: design.min_aisle_width_m
      op: ">="
      value: 6.0
    applies_when:
      brief.greenhouse_type: year_round

  - rule_id: SP107.4.4-seasonal
    sp_clause: "СП 107.13330 п. 4.4"
    summary: "Расстояние между сезонными теплицами — не менее 1,5 м."
    severity: error
    check:
      field: design.min_aisle_width_m
      op: ">="
      value: 1.5
    applies_when:
      brief.greenhouse_type: seasonal

  - rule_id: SP107.5.11-glass
    sp_clause: "СП 107.13330 п. 5.11"
    summary: "При стеклянном ограждении доля светонепроницаемых конструкций не более 15% (т.е. светопрозрачность блока не ниже 0.85)."
    severity: warning
    check:
      field: design.blocks[*].light_transmittance
      op: ">="
      value: 0.85
    applies_when:
      design.blocks[*].covering: glass

  - rule_id: SP107.5.11-film
    sp_clause: "СП 107.13330 п. 5.11"
    summary: "При плёночном ограждении доля светонепроницаемых конструкций не более 10% (светопрозрачность не ниже 0.90)."
    severity: warning
    check:
      field: design.blocks[*].light_transmittance
      op: ">="
      value: 0.90
    applies_when:
      design.blocks[*].covering: polyethylene

  - rule_id: SP107.7.18
    sp_clause: "СП 107.13330 п. 7.18"
    summary: "В многопролётных теплицах для овощей площадь проёмов естественной вентиляции — не менее 20% (10% для районов севернее 60° с.ш.). Здесь оценивается как доля от площади пола — упрощённое представление."
    severity: warning
    check:
      field: engineering.ventilation.required_vent_opening_pct_of_floor
      op: ">="
      value: 20.0
    applies_when:
      engineering.ventilation.forced_vent_required: false

  # ── Инженерные sanity-проверки (не из СП) ────────────────────────────────

  - rule_id: ENG.1-ridge-vs-eave
    sp_clause: "Инженерная проверка (не из СП): высота конька выше карниза"
    summary: "Высота в коньке должна быть выше высоты по водостоку как минимум на 0,5 м — иначе кровля не имеет уклона для стока."
    severity: error
    check:
      field: design.blocks[*].ridge_height_m
      op: ">"
      value: 0
    # Содержательная проверка (ridge > eave + 0.5) делается в rules_engine
    # как кастомный кейс — здесь только метаданные правила.

  - rule_id: ENG.2-aux-share
    sp_clause: "Инженерная проверка (не из СП): обоснованная доля подсобок"
    summary: "Подсобные зоны (котельная, склад, тарный, рассадник) должны занимать 5–30% площади комплекса. Меньше 5% — нехватка для обслуживания; больше 30% — неэффективное использование участка."
    severity: warning
    check:
      field: design.aux_share_pct
      op: ">="
      value: 5.0

  - rule_id: ENG.3-light-min
    sp_clause: "Инженерная проверка (не из СП): минимальное светопропускание для круглогодичной"
    summary: "Светопропускание ограждения круглогодичной теплицы должно быть не ниже 0.60 — иначе досветка экономически нецелесообразна."
    severity: error
    check:
      field: design.blocks[*].light_transmittance
      op: ">="
      value: 0.60
    applies_when:
      brief.greenhouse_type: year_round
